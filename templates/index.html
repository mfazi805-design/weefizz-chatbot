<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeeFizz · Assistant</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<div class="chat-wrapper">

  <div class="chat-header">
    <div class="header-left">
      <div class="online-dot"></div>
      <div>
        <div class="header-title"><span class="brand-accent">Wee</span>Fizz · Assistant</div>
        <div class="header-sub">Aide au formulaire · Form help</div>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <div class="sug-label" id="sug-label">Questions fréquentes :</div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="input-area">
    <input
      type="text"
      id="user-input"
      class="chat-input"
      placeholder="Posez votre question..."
      onkeydown="if(event.key==='Enter') sendMessage()"
      autocomplete="off"
    />
    <button class="send-btn" onclick="sendMessage()" aria-label="Envoyer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>

</div>

<script src="/static/js/chat.js"></script>
</body>
</html>
